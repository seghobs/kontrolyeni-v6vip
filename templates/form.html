<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Cache Devre Disi: Chrome, Safari, Firefox hicbir sayfayi hatirlamamali -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Instagram Post Kontrol</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}?v={{ range(1, 99999) | random }}">
</head>
<body data-token-error-message='{{ token_error_message|default("", true)|e }}'>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8 col-xl-6">
                <div class="form-card">
                    <h2><i class="fas fa-comments me-2"></i>Yorum Kontrolleri</h2>
                    <form id="checkForm" method="post" action="/">
                        <div class="mb-3">
                            <label for="post_link_single" class="form-label">
                                <i class="fab fa-instagram me-2"></i>İnstagram Post Link(ler)i
                            </label>
                            <div class="mode-toggle-group">
                                <button type="button" id="modeSingle" class="mode-toggle-btn active" onclick="setCheckMode('single')">
                                    Tekli kontrol
                                </button>
                                <button type="button" id="modeMulti" class="mode-toggle-btn" onclick="setCheckMode('multi')">
                                    Toplu kontrol
                                </button>
                            </div>
                            <label id="sharersFilterWrapper" class="modern-checkbox-wrapper mb-3" for="onlySharersCheck" style="display: none;">
                                <div class="checkbox-content">
                                    <div class="icon-box">
                                         <i class="fas fa-filter"></i>
                                    </div>
                                    <div class="text-content">
                                        <span class="title">Sadece Atanları Getir</span>
                                        <span class="desc">Gruptaki herkes yerine paylaşım yapanları listeler</span>
                                    </div>
                                </div>
                                <div class="toggle-switch">
                                    <input type="checkbox" id="onlySharersCheck" onchange="handleSharersCheckbox()">
                                    <span class="slider"></span>
                                </div>
                            </label>
                            
                            <!-- Yeni Filtre: Beğenisi 90 ve altı olanlar -->
                            <label id="lowLikesFilterWrapper" class="modern-checkbox-wrapper mb-3" for="lowLikesCheck" style="display: none;">
                                <div class="checkbox-content">
                                    <div class="icon-box" style="background: rgba(239, 68, 68, 0.15); color: #ef4444;">
                                         <i class="fas fa-heart-broken"></i>
                                    </div>
                                    <div class="text-content">
                                        <span class="title">Beğenisi 90 ve Altı Olanlar</span>
                                        <span class="desc">90 ve altı beğeni alan paylaşımları seçer (Listeyi etkilemez)</span>
                                    </div>
                                </div>
                                <div class="toggle-switch">
                                    <input type="checkbox" id="lowLikesCheck" name="check_likes" value="on" onchange="handleLowLikesCheckbox()">
                                    <span class="slider red-slider"></span>
                                </div>
                            </label>

                            <div id="modeHint" class="mode-hint">
                                Tekli kontrol: Tek bir post/reel linki gir.
                            </div>
                            <!-- Tekli kontrol: input -->
                            <input type="text"
                                   id="post_link_single"
                                   name="post_link"
                                   class="form-control"
                                   placeholder="https://www.instagram.com/p/...">
                            <!-- Toplu kontrol: textarea (varsayılan gizli) -->
                            <textarea id="post_link_multi"
                                      name="post_link"
                                      class="form-control mt-2"
                                      style="display:none;"
                                      placeholder="Her satira bir post/reel linki yazin&#10;https://www.instagram.com/p/...&#10;https://www.instagram.com/reel/..."
                                      rows="4"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="grup_uye" class="form-label d-flex align-items-center">
                                <div><i class="fas fa-users me-2"></i>Grup Üye Listesi</div>
                                <span id="selectedGroupBadge" class="badge ms-auto" style="background: rgba(168, 85, 247, 0.2); border: 1px solid rgba(168, 85, 247, 0.5); color: #e9d5ff; font-weight: 500; letter-spacing: 0.5px; display: none;"></span>
                            </label>
                            <div class="mb-2">
                                <div class="custom-dropdown" id="groupDropdown">
                                    <button type="button" class="dropdown-trigger" onclick="toggleDropdown('groupDropdown')">
                                        <span class="dropdown-text">-- Instagram Grubu Seç --</span>
                                        <i class="fas fa-chevron-down dropdown-arrow"></i>
                                    </button>
                                    <div class="dropdown-menu">
                                        <input type="text" class="dropdown-search" placeholder="Grup ara..." onkeyup="filterDropdown('groupDropdown', this.value)">
                                        <div class="dropdown-options"></div>
                                    </div>
                                </div>
                                <select id="groupSelect" class="hidden-select" onchange="loadGroupMembers()">
                                    <option value="">-- Instagram Grubu Seç --</option>
                                </select>
                            </div>
                            <div id="groupPostsSection" class="mb-2" style="display: none;">
                                <div class="d-flex gap-2 mb-2">
                                    <div class="custom-dropdown flex-grow-1" id="dateDropdown">
                                        <button type="button" class="dropdown-trigger" onclick="toggleDropdown('dateDropdown')">
                                            <span class="dropdown-text">Dün</span>
                                            <i class="fas fa-chevron-down dropdown-arrow"></i>
                                        </button>
                                        <div class="dropdown-menu">
                                            <div class="dropdown-options">
                                                <div class="dropdown-option selected" onclick="selectDateAndLoadPosts('yesterday', 'Dün')">Dün</div>
                                                <div class="dropdown-option" onclick="selectDateAndLoadPosts('today', 'Bugün')">Bugün</div>
                                            </div>
                                        </div>
                                    </div>
                                    <select id="dateFilter" class="hidden-select">
                                        <option value="yesterday" selected>Dün</option>
                                        <option value="today">Bugün</option>
                                    </select>
                                </div>
                                <div class="custom-dropdown" id="postDropdown">
                                    <button type="button" class="dropdown-trigger" onclick="toggleDropdown('postDropdown')">
                                        <span class="dropdown-text">-- Paylaşım Seç --</span>
                                        <i class="fas fa-chevron-down dropdown-arrow"></i>
                                    </button>
                                    <div class="dropdown-menu">
                                        <input type="text" class="dropdown-search" placeholder="Paylaşım ara..." onkeyup="filterDropdown('postDropdown', this.value)">
                                        <div class="dropdown-options"></div>
                                    </div>
                                </div>
                                <select id="postSelect" class="hidden-select" onchange="addPostLink()">
                                    <option value="">-- Paylaşım Seç --</option>
                                </select>

                            </div>
                            <textarea id="grup_uye" name="grup_uye" class="form-control" 
                                      placeholder="Her satıra bir kullanıcı adı yazın" 
                                      oninput="updateUserCount()" required></textarea>
                            <span id="user_count">0 Adet kullanıcı eklendi.</span>
                        </div>
                        <button type="submit" id="submitCheckBtn" class="btn btn-primary w-100 mb-3">
                            <i class="fas fa-search me-2"></i>Kontrol Et
                        </button>
                    </form>
                    <button onclick="location.href='token_al'" class="btn btn-secondary w-100 mb-2">
                        <i class="fas fa-key me-2"></i>Token Al
                    </button>
                    <button onclick="location.href='admin'" class="btn btn-admin w-100">
                        <i class="fas fa-lock me-2"></i>Admin Panel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="tokenErrorModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-title"><i class="fas fa-triangle-exclamation me-2"></i>Token Uyarisi</div>
            <div class="modal-text" id="tokenErrorText"></div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary w-100" id="closeTokenModalBtn">Tamam</button>
                <button type="button" class="btn btn-admin w-100" onclick="location.href='/admin'">Admin Panel</button>
            </div>
        </div>
    </div>

    <!-- İlerleme overlay -->
    <div id="progressOverlay" class="modal-overlay" style="display: none;">
        <div class="modal-card text-center">
            <div class="modal-title"><i class="fas fa-spinner fa-spin me-2"></i>Yorumlar cekiliyor</div>
            <div class="modal-text" id="progressText">Link donusturuluyor...</div>
            <div class="progress mt-2" style="height: 8px; background: rgba(255,255,255,0.1); border-radius: 8px;">
                <div id="progressBar" class="progress-bar" role="progressbar" style="width: 0%; background: #7877c6; border-radius: 8px;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/form.js') }}?v={{ range(1, 99999) | random }}"></script>
    {% if refresh %}
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const link = urlParams.get('link') || '';
            const group = urlParams.get('group') || '';
            
            if (link) {
                document.getElementById('post_link').value = decodeURIComponent(link);
            }
            if (group) {
                document.getElementById('grup_uye').value = decodeURIComponent(group);
            }
            
            if (link) {
                setTimeout(function() {
                    document.getElementById('kontrolForm').dispatchEvent(new Event('submit'));
                }, 500);
            }
        });
    </script>
    {% endif %}
</body>
</html>
